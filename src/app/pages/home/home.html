<section class="hero">
    <div class="hero-bg">

        <span class="circle circle1"></span>

        <span class="circle circle2"></span>

        <span class="circle circle3"></span>

    </div>

    <div class="container">

        <div class="row align-items-center min-vh-100">

            <!-- Left Side -->
            <div class="col-lg-6">

                <p class="hello">
                    👋 Hello, I'm
                </p>

                <h1 class="name">
                    Sujan Ghosh
                </h1>

                <div class="role">

                    <ngx-typed-js [strings]="[
      'Full Stack Developer',
      'Angular Developer',
      '.NET Developer'
      
    ]" [typeSpeed]="70" [backSpeed]="40" [loop]="true">

                        <h2 class="typing"></h2>

                    </ngx-typed-js>

                </div>

                <p class="description">
                    Results-oriented Full Stack Developer specializing in Angular and .NET Core.
                    Passionate about building secure, scalable and modern web applications with
                    clean architecture and exceptional user experiences.
                </p>

                <div class="hero-buttons">

                    <button class="btn btn-primary btn-lg me-3">
                        View Projects
                    </button>

                    <button class="btn btn-outline-light btn-lg">
                        Download CV
                    </button>

                </div>

                <div class="social-icons">

                    <a href="https://github.com/Sujan-web-pro" target="_blank">
                        <i class="fab fa-github"></i>
                    </a>

                    <a href="https://www.linkedin.com/in/sujan-ghosh" target="_blank">
                        <i class="fab fa-linkedin"></i>
                    </a>

                </div>

            </div>

            <!-- Right Side -->

            <div class="col-lg-6">

                <div class="profile-wrapper">


                    <div class="image-border">

                        <img src="images/sujan.jpg" alt="Sujan Ghosh" class="profile-image">

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>
