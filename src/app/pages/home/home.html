<section class="hero">
    <div class="hero-bg">
        <span class="circle circle1"></span>
        <span class="circle circle2"></span>
        <span class="circle circle3"></span>
    </div>

    <div class="container">
        <div class="row align-items-center min-vh-100">

            <!-- Left Side -->
            <div class="col-lg-6">

                <p class="hello">👋 Hello, I'm</p>

                <h1 class="name">Sujan Ghosh</h1>

                <div class="role">
                    <ngx-typed-js [strings]="[
      'Full Stack Developer',
      'Angular Developer',
      '.NET Developer'
    ]" [typeSpeed]="70" [backSpeed]="40" [loop]="true">
                        <h2 class="typing"></h2>
                    </ngx-typed-js>
                </div>

                <p class="description">
                    Results-oriented Full Stack Developer specializing in Angular and .NET Core.
                    Passionate about building secure, scalable and modern web applications with
                    clean architecture and exceptional user experiences.
                </p>

                    </div>
                    <div class="stat">
                        <span class="stat-num">10+</span>
                        <span class="stat-label">Technologies</span>
                    </div>
                </div> -->

                <div class="hero-buttons">
                    <a routerLink="/projects" class="btn btn-primary btn-lg me-3">
                        View Projects
                    </a>
                    <a href="resume/Sujan_Ghosh_Resume.pdf" class="btn btn-outline-light btn-lg" download>
                        Download CV
                    </a>
                </div>

                <div class="social-icons">
                    <a href="https://github.com/Sujan-web-pro" target="_blank">

                    </a>
                    <a href="https://www.linkedin.com/in/sujan-ghosh" target="_blank">

            <!-- Right Side -->

                <div class="profile-wrapper">
