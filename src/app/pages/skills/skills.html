<section class="skills-section">
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="container">

        <div class="section-heading">
            <span class="section-eyebrow">Technologies I work with</span>
            <h2>Technical Skills</h2>
        </div>

        <div class="skill-group" *ngFor="let group of skillCategories">

            <h4 class="group-title">{{ group.category }}</h4>

            <div class="row g-4">
                <div class="col-lg-3 col-md-4 col-6" *ngFor="let skill of group.skills">
                    <div class="skill-card">
                        <i [class]="skill.icon"></i>
                        <h5>{{ skill.name }}</h5>
                        <div class="level-bar">
                            <div class="level-fill" [style.width.%]="skill.level"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

</section>
