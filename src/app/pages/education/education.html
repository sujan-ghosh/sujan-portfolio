<section class="education-section">

    <div class="container">

        <div class="section-heading">

            <h2>Education</h2>

            <p>Academic Background</p>

        </div>

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="education-card" *ngFor="let item of education">

                    <div class="year">

                        {{item.year}}

                    </div>

                    <h3>

                        {{item.degree}}

                    </h3>

                    <h5>

                        {{item.branch}}

                    </h5>

                    <p>

                        {{item.institute}}

                    </p>

                    <span class="cgpa">

                        {{item.cgpa}}

                    </span>

                </div>

            </div>

        </div>

    </div>

</section>
